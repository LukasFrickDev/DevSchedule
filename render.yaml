databases:
  - name: devschedule-postgres
    plan: free
    databaseName: devschedule
    user: devschedule

services:
  - type: web
    name: devschedule-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /api/devschedule/health/
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devschedule-postgres
          property: connectionString
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
