services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: devschedule
      POSTGRES_USER: devschedule
      POSTGRES_PASSWORD: devschedule
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devschedule -d devschedule"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
